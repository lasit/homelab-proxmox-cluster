# systemd drop-in for nut-monitor.service
# Ensures nut-monitor waits for FSD recovery before starting.
# Without this, nut-monitor could start in parallel with the recovery
# script, see stale FSD, and re-trigger shutdown before recovery completes.
#
# Install to: /etc/systemd/system/nut-monitor.service.d/wait-for-recovery.conf
# Then run: systemctl daemon-reload

[Unit]
After=nut-fsd-recovery.service
